schema_version: 1

package:
  name: llama-cpp-turboquant
  version: "0.0.8659"

source:
  git: https://github.com/TheTom/llama-cpp-turboquant.git
  branch: feature/turboquant-kv-cache
  depth: 1

build:
  number: 1

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - cmake >=3.20
    - ninja
    - git
  host:
    - if: osx
      then: __osx >=13.0
  run:
    - if: osx
      then: __osx >=13.0

about:
  homepage: https://github.com/TheTom/llama-cpp-turboquant
  license: MIT
  license_file: LICENSE
  summary: llama.cpp with TurboQuant KV cache compression (turbo2/3/4)
  repository: https://github.com/TheTom/llama-cpp-turboquant
