name: Build and Upload Conda Packages

on:
  workflow_dispatch:
  push:
    paths:
      - 'recipes/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-64
            os: ubuntu-latest
          - platform: linux-aarch64
            os: ubuntu-24.04-arm
          - platform: osx-arm64
            os: macos-14
          - platform: win-64
            os: windows-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install rattler-build (unix)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://pixi.sh/install.sh | bash
          ~/.pixi/bin/pixi global install rattler-build

      - name: Install rattler-build (windows)
        if: runner.os == 'Windows'
        run: |
          iwr -useb https://pixi.sh/install.ps1 | iex
          pixi global install rattler-build

      - name: Build llama-cpp-turboquant
        run: rattler-build build --recipe recipes/llama-cpp-turboquant/recipe.yaml --output-dir conda-output

      - name: Upload to prefix.dev
        if: github.ref == 'refs/heads/main'
        run: |
          rattler-build upload prefix -a "${{ secrets.PREFIX_DEV_TOKEN }}" -c repo \
            conda-output/${{ matrix.platform }}/*.conda

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-turboquant-${{ matrix.platform }}
          path: conda-output/**/*.conda

  build-cuda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: '12.6.0'
          method: network

      - name: Install rattler-build
        run: |
          curl -fsSL https://pixi.sh/install.sh | bash
          ~/.pixi/bin/pixi global install rattler-build

      - name: Build llama-cpp-turboquant-cuda
        run: rattler-build build --recipe recipes/llama-cpp-turboquant-cuda/recipe.yaml --output-dir conda-output

      - name: Upload to prefix.dev
        if: github.ref == 'refs/heads/main'
        run: |
          rattler-build upload prefix -a "${{ secrets.PREFIX_DEV_TOKEN }}" -c repo \
            conda-output/linux-64/*.conda

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-turboquant-cuda-linux-64
          path: conda-output/**/*.conda
